<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #3367d6;
    }
    .status {
      margin-top: 8px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="form-group">
    <label for="uuid">UUID:</label>
    <input type="text" id="uuid" placeholder="Enter your UUID">
  </div>
  <button id="save">Save</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
